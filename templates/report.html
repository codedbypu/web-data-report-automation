<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <style>
        /* ===== Page Setup ===== */
        @page {
            size: A4;
            margin: 20mm;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            color: #222;
            line-height: 1.6;
            font-size: 14px;
        }

        /* ===== Cover ===== */
        .cover {
            text-align: center;
            margin-top: 10px;
            /* page-break-after: always; */
        }

        .cover h1 {
            font-size: 32px;
            margin-bottom: 16px;
        }

        .cover .meta {
            color: #666;
            font-size: 14px;
        }

        /* ===== Layout ===== */
        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1,
        h2,
        h3 {
            margin-top: 24px;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        h1 {
            font-size: 24px;
            border-bottom: 2px solid #333;
            padding-bottom: 6px;
        }

        h2 {
            font-size: 20px;
        }

        h3 {
            font-size: 16px;
        }

        p {
            margin: 8px 0;
            text-align: justify;
        }

        ul {
            margin: 8px 0 8px 20px;
        }

        li {
            margin: 4px 0;
        }

        img {
            max-width: 100%;
            margin: 12px 0;
        }

        /* ===== Section Box ===== */
        .section {
            margin-bottom: 18px;
        }

        /* ===== Footer ===== */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            /* margin-bottom: 10px; */
            text-align: center;
            font-size: 12px;
            color: #777;
        }

        /* ===== Print Helpers ===== */
        .page-break {
            page-break-after: always;
        }
    </style>
</head>

<body>

    <!-- ===== Cover Page ===== -->
    <div class="cover">
        <h1 id="title">{{REPORT_TITLE}}</h1>
        <div class="meta">
            <div id="source">Source: {{SOURCE_URL}}</div>
            <div id="date">Generated: {{GENERATED_AT}}</div>
        </div>
    </div>

    <!-- ===== Main Content ===== -->
    <div class="container">
        {{CONTENT_BLOCK}}
    </div>

    <!-- ===== Footer ===== -->
    <div class="footer">
        Generated by Web Data Report Automation
    </div>

</body>

</html>
